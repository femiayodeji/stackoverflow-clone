services:
  mysql:
    image: mysql:8.0
    container_name: stackoverflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackoverflow_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT}
      DB_HOST: mysql
        DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DIALECT: mysql
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_TO_FILE: ${LOG_TO_FILE}
      LOG_FILE_PATH: ${LOG_FILE_PATH}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SLACK_LOG_LEVEL: ${SLACK_LOG_LEVEL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL}
    ports:
      - '${PORT}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npx sequelize-cli db:migrate &&
            npx sequelize-cli db:seed:all &&
            npm run dev"
volumes:
  mysql_data:
    driver: local